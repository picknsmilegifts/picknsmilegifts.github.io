<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pick N Smile</title>

<link rel="icon" href="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Pick%20N%20Smile.jpg">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

/* ---------------- GLOBAL ---------------- */

body{
margin:0;
font-family: "Segoe UI";
background:linear-gradient(135deg,#1a0033,#0a1b5c,#3d0075);
color:white;
overflow-x:hidden;
}

/* neon glow */

.neon{
text-shadow:
0 0 5px #ff00ff,
0 0 10px #00ffff,
0 0 20px #00ffff,
0 0 40px #ff00ff;
}

/* header */

header{
display:flex;
align-items:center;
justify-content:center;
gap:15px;
padding:20px;
font-size:36px;
font-weight:bold;
background:#14002a;
box-shadow:0 0 20px #ff00ff;
}

header img{
height:60px;
border-radius:10px;
}

/* intro screen */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(120deg,#ff00ff,#00ffff,#ff7700);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:1000;
animation:introFade 4s forwards;
}

#intro img{
width:200px;
border-radius:20px;
animation:logoFlash 2s infinite;
}

@keyframes logoFlash{
0%{transform:scale(1);filter:brightness(1)}
50%{transform:scale(1.1);filter:brightness(2)}
100%{transform:scale(1)}
}

@keyframes introFade{
0%{opacity:1}
80%{opacity:1}
100%{opacity:0;visibility:hidden}
}

/* arrow */

.scroll-arrow{
text-align:center;
font-size:40px;
color:#ffcc00;
animation:bounce 1s infinite;
margin-top:20px;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(10px)}
}

/* products */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:40px;
padding:50px;
}

/* product card */

.card{
background:#14002a;
border-radius:20px;
padding:20px;
box-shadow:0 0 20px #00ffff;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 30px #ff00ff;
}

.card img{
width:100%;
border-radius:15px;
}

/* buttons */

button{
background:#ff0066;
border:none;
padding:10px 20px;
color:white;
border-radius:10px;
cursor:pointer;
margin-top:10px;
font-weight:bold;
box-shadow:0 0 10px #ff0066;
}

button:hover{
background:#ff7700;
}

/* dropdown */

select,input{
padding:8px;
border-radius:6px;
margin-top:8px;
border:none;
}

/* cart button */

#cartButton{
position:fixed;
top:20px;
right:20px;
background:#ffcc00;
color:black;
padding:10px 15px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* cart modal */

#cartModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
align-items:center;
justify-content:center;
}

.cart-content{
background:#14002a;
padding:30px;
border-radius:15px;
width:400px;
box-shadow:0 0 30px #00ffff;
}

.cart-item{
margin-bottom:10px;
}

/* order form */

#orderForm{
display:none;
margin-top:20px;
}

footer{
text-align:center;
padding:20px;
margin-top:50px;
background:#14002a;
box-shadow:0 0 20px #ff00ff;
}

</style>
</head>

<body>

<!-- INTRO -->

<div id="intro">
<img src="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Pick%20N%20Smile.jpg">
<h1 class="neon">Pick N Smile</h1>
</div>

<!-- MUSIC -->

<audio autoplay loop>
<source src="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/refs/heads/main/the_mountain-happy-happy-music-496549.mp3" type="audio/mpeg">
</audio>

<!-- HEADER -->

<header>
<img src="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Pick%20N%20Smile.jpg">
Pick N Smile
</header>

<div id="cartButton">🛒 Cart</div>

<h2 style="text-align:center;margin-top:40px" class="neon">
Items On Sale
</h2>

<div class="scroll-arrow">⬇</div>

<!-- PRODUCTS -->

<div class="products" id="productList"></div>

<!-- CART MODAL -->

<div id="cartModal">

<div class="cart-content">

<h2>Cart</h2>

<div id="cartItems"></div>

<button onclick="showOrder()">Place Order</button>

<div id="orderForm">

<input id="name" placeholder="Customer Name"><br>
<input id="email" placeholder="Customer Email"><br>
<input id="phone" placeholder="Customer Phone"><br>

<button onclick="sendOrder()">Submit Order</button>

</div>

</div>

</div>

<footer>
© Pick N Smile
</footer>

<script>

/* ---------------- EMAIL JS INIT ---------------- */

(function(){
emailjs.init("JGA6P6Uh3Bs-jD35I");
})();

/* ---------------- CART ---------------- */

let cart = [];

/* ---------------- PRODUCTS ---------------- */

const products = [

{
name:"Aprons",
image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Aprons.jpeg",
types:["Pink","Blue","White"]
},

{
name:"Bookmarks (Thread Knots)",
image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Bookmark%20(Thread%20Knots).jpeg",
types:["Blue","Red","Pink","Violet"]
},

{
name:"Colour Pencils",
image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Colour%20Pencils.jpeg",
types:["12 Colours"]
},

{
name:"Erasers",
image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Erasers.jpeg",
types:["Red","Yellow","Blue","Green"]
},

{
name:"Fidget Spinners",
image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Fidget%20Spinners%20.jpeg",
types:["Korean Design","Cartoon Character","Teddy Bear","Stars"]
},

{
name:"Animal Sketch Book",
image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Funny%20Masks.jpeg",
types:["Crocodile","Tiger","Giraffe"]
},

{
name:"Korean Hand Bags",
image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Korean%20Hand%20Bags.jpeg",
types:["Random Colour"]
},

{
name:"Pencil Stand",
image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Pencil%20Stand.jpeg",
types:["Yellow","Red","Blue"]
},

{
name:"Sticky Notes",
image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Sticky%20Notes.jpeg",
types:["Type 1","Type 2"]
},

{
name:"Stitch Themed Stationary Pouch",
image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Stitch%20Themed%20Stationary%20Pouches.jpeg",
types:["Light Pink","Light Purple","Light Cyan","Light Grayish Brown"]
},

{
name:"Straw Summer Bags",
image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Straw%20Summer%20Bag.jpeg",
types:["Default"]
},

{
name:"Utensil Holders",
image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Utensil%20Holders.jpeg",
types:["Blue","Pink","Light Blue","Light Green"]
}

];

/* ---------------- RENDER PRODUCTS ---------------- */

const list = document.getElementById("productList");

products.forEach((p,index)=>{

let options = "";

p.types.forEach(t=>{
options += `<option>${t}</option>`
});

list.innerHTML += `

<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<select id="type${index}">
${options}
</select>

<br>

<select id="qty${index}">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<br>

<button onclick="addCart(${index})">
Add To Cart
</button>

</div>

`;

});

/* ---------------- ADD TO CART ---------------- */

function addCart(i){

let type = document.getElementById("type"+i).value;
let qty = parseInt(document.getElementById("qty"+i).value);

cart.push({
name:products[i].name,
type:type,
qty:qty
});

alert("Added to cart!");

}

/* ---------------- CART MODAL ---------------- */

const cartBtn = document.getElementById("cartButton");
const cartModal = document.getElementById("cartModal");

cartBtn.onclick = ()=>{

cartModal.style.display="flex";
renderCart();

}

function renderCart(){

let container = document.getElementById("cartItems");

container.innerHTML="";

cart.forEach(item=>{

container.innerHTML += `
<div class="cart-item">
${item.qty} x ${item.type} ${item.name}
</div>
`;

});

}

/* ---------------- ORDER FORM ---------------- */

function showOrder(){

document.getElementById("orderForm").style.display="block";

}

/* ---------------- SEND EMAIL ---------------- */

function sendOrder(){

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let phone = document.getElementById("phone").value;

let orderText="";

cart.forEach(i=>{
orderText += `${i.qty} x ${i.type} ${i.name}\n`;
});

let params = {

customer_name:name,
customer_email:email,
customer_phone:phone,
order_items:orderText,
order_date:new Date().toLocaleDateString()

};

emailjs.send(
"service_qnxa1we",
"template_pvco6lb",
params
).then(()=>{

alert("Order Sent! Company will contact you within 3 working days.");

cart=[];

});

}

</script>

</body>
</html>
