<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Pick N Smile</title>

<link rel="icon" href="https://raw.githubusercontent.com/picknsmilegifts/picknsmilegifts.github.io/main/Pick%20N%20Smile.jpg">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#2b006b,#001f5c,#3b008b);
color:white;
overflow-x:hidden;
}

/* INTRO */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:linear-gradient(120deg,#ff2a8a,#7b4dff,#1aa3ff);
z-index:9999;
animation:introFade 4s forwards;
}

#intro img{
width:200px;
border-radius:20px;
animation:logoFlash 1.5s infinite;
}

@keyframes logoFlash{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

@keyframes introFade{
0%{opacity:1}
80%{opacity:1}
100%{opacity:0;visibility:hidden}
}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:center;
gap:15px;
padding:20px;
font-size:34px;
font-weight:bold;
background:#14002a;
box-shadow:0 0 20px #ff2a8a;
}

header img{
height:60px;
border-radius:10px;
}

/* ARROW */

.arrow{
text-align:center;
font-size:50px;
color:#ffcc00;
animation:bounce 1s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(10px)}
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:40px;
padding:50px;
}

/* CARD */

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(8px);
border-radius:20px;
padding:20px;
text-align:center;
box-shadow:0 0 15px #00ffff;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 30px #ff00ff;
}

.card img{
width:100%;
border-radius:12px;
}

/* BUTTON */

button{
background:#ff0066;
border:none;
padding:10px 20px;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
box-shadow:0 0 10px #ff0066;
}

button:hover{
background:#ff7700;
}

/* INPUT */

select,input,textarea{
width:90%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
}

/* CART */

#cartButton{
position:fixed;
top:20px;
right:20px;
background:#ffcc00;
color:black;
padding:12px 16px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 20px #ffcc00;
}

#cartModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
align-items:center;
justify-content:center;
}

.cartBox{
background:#14002a;
padding:30px;
border-radius:15px;
width:420px;
max-height:80vh;
overflow-y:auto;
box-shadow:0 0 20px #00ffff;
}

.cartItem{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:#14002a;
box-shadow:0 0 20px #ff00ff;
}

</style>
</head>

<body>

<!-- INTRO -->

<div id="intro">
<img src="https://raw.githubusercontent.com/picknsmilegifts/picknsmilegifts.github.io/main/Pick%20N%20Smile.jpg">
<h1>Pick N Smile</h1>
</div>

<!-- MUSIC -->

<audio id="music" autoplay loop>
<source src="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/refs/heads/main/the_mountain-happy-happy-music-496549.mp3">
</audio>

<!-- HEADER -->

<header>
<img src="https://raw.githubusercontent.com/picknsmilegifts/picknsmilegifts.github.io/main/Pick%20N%20Smile.jpg">
Pick N Smile
</header>

<div id="cartButton">🛒 Cart (<span id="cartCount">0</span>)</div>

<h2 style="text-align:center;margin-top:40px">Items On Sale</h2>

<div class="arrow">⬇</div>

<div class="products" id="productList"></div>

<!-- CART -->

<div id="cartModal">

<div class="cartBox">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<button onclick="showOrder()">Place Order</button>

<div id="orderForm" style="display:none">

<h3>Customer Details</h3>

<input id="name" placeholder="Customer Name">
<input id="email" placeholder="Customer Email">
<input id="phone" placeholder="Customer Phone">

<h3>Order Summary</h3>

<pre id="orderSummary"></pre>

<button onclick="sendOrder()">Submit Order</button>

</div>

</div>

</div>

<footer>

Contact: 80507 99536  
<br>
© Pick N Smile

</footer>

<script>

emailjs.init("JGA6P6Uh3Bs-jD35I");

let cart={};

/* PRODUCTS */

const products=[

{name:"Aprons",img:["https://raw.githubusercontent.com/picknsmilegifts/picknsmilegifts.github.io/main/Aprons.jpeg"],types:["Pink","Blue","White"]},

{name:"Bookmarks (Thread Knots)",img:["https://raw.githubusercontent.com/picknsmilegifts/picknsmilegifts.github.io/main/Bookmark%20(Thread%20Knots).jpeg"],types:["Blue","Red","Pink","Violet"]},

{name:"Colour Pencils",img:["https://raw.githubusercontent.com/picknsmilegifts/picknsmilegifts.github.io/main/Colour%20Pencils.jpeg"],types:["12 Colours"]},

{name:"Erasers",img:["https://raw.githubusercontent.com/picknsmilegifts/picknsmilegifts.github.io/main/Erasers.jpeg"],types:["Red","Yellow","Blue","Green"]},

{name:"Fidget Spinners",img:["https://raw.githubusercontent.com/picknsmilegifts/picknsmilegifts.github.io/main/Fidget%20Spinners%20.jpeg"],types:["Korean Design","Cartoon Character","Teddy Bear","Stars"]}

];

const list=document.getElementById("productList");

products.forEach((p,i)=>{

let options="";

p.types.forEach(t=>{
options+=`<option>${t}</option>`;
});

list.innerHTML+=`

<div class="card">

<img src="${p.img[0]}">

<h3>${p.name}</h3>

<select id="type${i}">

${options}

</select>

<select id="qty${i}">

<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>

</select>

<button onclick="addCart(${i})">Add To Cart</button>

</div>

`;

});

function addCart(i){

let type=document.getElementById("type"+i).value;
let qty=parseInt(document.getElementById("qty"+i).value);

let key=products[i].name+"-"+type;

if(cart[key]){
cart[key].qty+=qty;
}else{
cart[key]={name:products[i].name,type:type,qty:qty};
}

renderCart();

}

function renderCart(){

let container=document.getElementById("cartItems");

container.innerHTML="";

let count=0;

for(let key in cart){

let item=cart[key];

count+=item.qty;

container.innerHTML+=`

<div class="cartItem">

${item.qty} x ${item.type} ${item.name}

<button onclick="removeItem('${key}')">❌</button>

</div>

`;

}

document.getElementById("cartCount").innerText=count;

}

function removeItem(key){
delete cart[key];
renderCart();
}

document.getElementById("cartButton").onclick=()=>{
document.getElementById("cartModal").style.display="flex";
};

function showOrder(){

document.getElementById("orderForm").style.display="block";

let order="";

for(let key in cart){
let i=cart[key];
order+=`${i.qty} x ${i.type} ${i.name}\n`;
}

document.getElementById("orderSummary").innerText=order;

}

function sendOrder(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;

let order="";

for(let key in cart){
let i=cart[key];
order+=`${i.qty} x ${i.type} ${i.name}\n`;
}

let date=new Date().toLocaleDateString();

emailjs.send(
"service_qnxa1we",
"template_pvco6lb",
{
customer_name:name,
customer_email:email,
customer_phone:phone,
order_items:order,
order_date:date
})

.then(()=>{

alert("Order Sent Successfully!");

cart={};

renderCart();

document.getElementById("cartModal").style.display="none";

})

.catch(()=>{

alert("Email failed");

});

}

/* MUSIC AUTOPLAY FIX */

document.body.addEventListener("click",()=>{

document.getElementById("music").play();

},{once:true});

</script>

</body>
</html>
