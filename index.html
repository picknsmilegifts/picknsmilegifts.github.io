```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pick N Smile</title>

<link rel="icon" href="https://raw.githubusercontent.com/picknsmilegifts/picknsmilegifts.github.io/main/Pick%20N%20Smile.jpg">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

/* GLOBAL */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
background:linear-gradient(135deg,#ff8ad6,#b49bff,#7fd8ff,#0c2b63);
background-size:400% 400%;
animation:bg 14s infinite alternate;
overflow-x:hidden;
}

@keyframes bg{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:rgba(0,0,0,.65);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
z-index:1000;
backdrop-filter:blur(6px);
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:24px;
font-weight:bold;
text-shadow:0 0 10px #ff7cff;
}

.logo img{
height:40px;
border-radius:50%;
}

.icons span{
font-size:22px;
margin-left:15px;
cursor:pointer;
}

/* INTRO */

#intro{
position:fixed;
width:100%;
height:100vh;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:3000;
}

#intro img{
width:200px;
animation:zoom 3s forwards;
}

@keyframes zoom{
0%{opacity:0;transform:scale(.5)}
100%{opacity:1;transform:scale(1)}
}

/* HERO */

.hero{
margin-top:90px;
text-align:center;
padding:70px 20px;
}

.hero h1{
font-size:48px;
text-shadow:0 0 15px white;
}

.arrow{
font-size:60px;
animation:bounce 1.3s infinite;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(14px)}
100%{transform:translateY(0)}
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
padding:40px;
}

.card{
background:rgba(0,0,0,.55);
padding:18px;
border-radius:14px;
box-shadow:0 0 20px #64b6ff;
transition:.35s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 30px #ff8df4;
}

.card img{
width:100%;
border-radius:10px;
}

.card h3{
margin-top:10px;
}

.card select,
.card input{
width:100%;
margin-top:8px;
padding:8px;
border-radius:6px;
border:none;
}

.card button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#ff5dd2;
color:white;
font-weight:bold;
cursor:pointer;
}

/* CART */

.cart{
position:fixed;
top:0;
right:-420px;
width:420px;
height:100%;
background:#0c0c0c;
padding:20px;
transition:.4s;
z-index:1500;
overflow:auto;
}

.cart.open{
right:0;
}

.cart h2{
margin-top:0;
}

.cart-item{
border-bottom:1px solid #444;
padding:10px 0;
}

.checkout{
margin-top:20px;
padding:10px;
width:100%;
background:#00ffc3;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

/* CHECKOUT FORM */

.checkout-form{
display:none;
padding:40px;
background:#000;
}

.checkout-form input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

/* CONFETTI */

.confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

</style>
</head>

<body>

<div id="intro">
<img src="https://raw.githubusercontent.com/picknsmilegifts/picknsmilegifts.github.io/main/Pick%20N%20Smile.jpg">
<h2>Pick N Smile</h2>
</div>

<audio autoplay loop>
<source src="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/refs/heads/main/the_mountain-happy-happy-music-496549.mp3">
</audio>

<div class="navbar">

<div class="logo">
<img src="https://raw.githubusercontent.com/picknsmilegifts/picknsmilegifts.github.io/main/Pick%20N%20Smile.jpg">
Pick N Smile
</div>

<div class="icons">

<span onclick="window.open('https://www.instagram.com/picknsmile4u?igsh=MmszbXY4aHB0aHRi')">📸</span>

<span onclick="copyPhone()">📞</span>

<span onclick="toggleCart()">🛒</span>

</div>

</div>

<div class="hero">
<h1>Items On Sale</h1>
<div class="arrow">⬇</div>
</div>

<div class="products">

<!-- APRON -->

<div class="card">
<img src="https://raw.githubusercontent.com/picknsmilegifts/picknsmilegifts.github.io/main/Aprons.jpeg">
<h3>Aprons</h3>
<select id="apronType">
<option>Pink</option>
<option>Blue</option>
<option>White</option>
</select>
<input type="number" id="apronQty" min="1" max="10" value="1">
<button onclick="addItem('Apron',apronType.value,apronQty.value)">Add to Cart</button>
</div>

<!-- BOOKMARK -->

<div class="card">
<img src="https://raw.githubusercontent.com/picknsmilegifts/picknsmilegifts.github.io/main/Bookmark%20(Thread%20Knots).jpeg">
<h3>Bookmarks</h3>
<select id="bookmarkType">
<option>Blue</option>
<option>Red</option>
<option>Pink</option>
<option>Violet</option>
</select>
<input type="number" id="bookmarkQty" min="1" max="10" value="1">
<button onclick="addItem('Bookmark',bookmarkType.value,bookmarkQty.value)">Add</button>
</div>

<!-- COLOR PENCILS -->

<div class="card">
<img src="https://raw.githubusercontent.com/picknsmilegifts/picknsmilegifts.github.io/main/Colour%20Pencils.jpeg">
<h3>Colour Pencils</h3>
<input type="number" id="pencilQty" min="1" max="10" value="1">
<button onclick="addItem('Colour Pencil','12 Colour Pack',pencilQty.value)">Add</button>
</div>

<!-- ERASERS -->

<div class="card">
<img src="https://raw.githubusercontent.com/picknsmilegifts/picknsmilegifts.github.io/main/Erasers.jpeg">
<h3>Erasers</h3>
<select id="eraserType">
<option>Red</option>
<option>Yellow</option>
<option>Blue</option>
<option>Green</option>
</select>
<input type="number" id="eraserQty" min="1" max="10" value="1">
<button onclick="addItem('Eraser',eraserType.value,eraserQty.value)">Add</button>
</div>

<!-- FIDGET SPINNER -->

<div class="card">
<img src="https://raw.githubusercontent.com/picknsmilegifts/picknsmilegifts.github.io/main/Fidget%20Spinners%20.jpeg">
<h3>Fidget Spinners</h3>
<select id="spinType">
<option>Korean Design</option>
<option>Cartoon Character</option>
<option>Teddy Bear</option>
<option>Stars</option>
</select>
<input type="number" id="spinQty" min="1" max="10" value="1">
<button onclick="addItem('Fidget Spinner',spinType.value,spinQty.value)">Add</button>
</div>

<!-- PENCIL STAND -->

<div class="card">
<img src="https://raw.githubusercontent.com/picknsmilegifts/picknsmilegifts.github.io/main/Pencil%20Stand.jpeg">
<h3>Pencil Stand</h3>
<select id="standType">
<option>Yellow</option>
<option>Red</option>
<option>Blue</option>
</select>
<input type="number" id="standQty" min="1" max="10" value="1">
<button onclick="addItem('Pencil Stand',standType.value,standQty.value)">Add</button>
</div>

<!-- STICKY NOTES -->

<div class="card">
<img src="https://raw.githubusercontent.com/picknsmilegifts/picknsmilegifts.github.io/main/Sticky%20Notes.jpeg">
<h3>Sticky Notes</h3>
<select id="stickyType">
<option>Type 1</option>
<option>Type 2</option>
</select>
<input type="number" id="stickyQty" min="1" max="10" value="1">
<button onclick="addItem('Sticky Notes',stickyType.value,stickyQty.value)">Add</button>
</div>

<!-- STITCH POUCH -->

<div class="card">
<img src="https://raw.githubusercontent.com/picknsmilegifts/picknsmilegifts.github.io/main/Stitch%20Themed%20Stationary%20Pouches.jpeg">
<h3>Stitch Pouch</h3>
<select id="stitchType">
<option>Light Pink</option>
<option>Light Purple</option>
<option>Light Cyan</option>
<option>Light Brown</option>
</select>
<input type="number" id="stitchQty" min="1" max="10" value="1">
<button onclick="addItem('Stitch Pouch',stitchType.value,stitchQty.value)">Add</button>
</div>

</div>

<div class="cart" id="cart">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<button class="checkout" onclick="showCheckout()">Place Order</button>
</div>

<div class="checkout-form" id="checkout">

<h2>Customer Details</h2>

<input id="customerName" placeholder="Name">
<input id="customerEmail" placeholder="Email">
<input id="customerPhone" placeholder="Phone">

<button class="checkout" onclick="sendOrder()">Submit Order</button>

</div>

<script>

emailjs.init("JGA6P6Uh3Bs-jD35I")

let cart={}

function addItem(name,type,qty){

qty=parseInt(qty)

let key=name+" - "+type

if(cart[key]){

cart[key]+=qty

}else{

cart[key]=qty

}

updateCart()

confetti()

}

function updateCart(){

let box=document.getElementById("cartItems")

box.innerHTML=""

for(let item in cart){

box.innerHTML+=`<div class="cart-item">${item} x ${cart[item]}</div>`

}

}

function toggleCart(){

document.getElementById("cart").classList.toggle("open")

}

function showCheckout(){

document.getElementById("checkout").style.display="block"

}

let sent=false

function sendOrder(){

if(sent){

alert("Order already submitted this session")

return

}

let name=document.getElementById("customerName").value
let email=document.getElementById("customerEmail").value
let phone=document.getElementById("customerPhone").value

let items=""

for(let i in cart){

items+=i+" x "+cart[i]+"\n"

}

let params={

customer_name:name,
customer_email:email,
customer_phone:phone,
order_items:items,
order_date:new Date().toLocaleString()

}

emailjs.send("service_qnxa1we","template_pvco6lb",params)
.then(()=>{

alert("Order Sent!")

sent=true

})

}

function copyPhone(){

navigator.clipboard.writeText("+918050799536")

alert("Phone number copied!")

}

setTimeout(()=>{

document.getElementById("intro").style.display="none"

},3000)

function confetti(){

for(let i=0;i<25;i++){

let c=document.createElement("div")

c.style.position="fixed"
c.style.width="6px"
c.style.height="6px"
c.style.background="yellow"
c.style.left=Math.random()*100+"%"
c.style.top=Math.random()*100+"%"
c.style.zIndex=9999

document.body.appendChild(c)

setTimeout(()=>c.remove(),2000)

}

}

</script>

</body>
</html>
