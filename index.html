<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pick N Smile</title>

<link rel="icon" href="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Pick%20N%20Smile.jpg">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

/* ---------------- GLOBAL ---------------- */

body{
margin:0;
font-family:"Segoe UI",sans-serif;
background:linear-gradient(135deg,#1a0033,#0a1b5c,#3d0075);
color:white;
overflow-x:hidden;
}

/* neon glow */

.neon{
text-shadow:
0 0 5px #ff00ff,
0 0 10px #00ffff,
0 0 20px #00ffff,
0 0 40px #ff00ff;
}

/* header */

header{
display:flex;
align-items:center;
justify-content:center;
gap:15px;
padding:20px;
font-size:36px;
font-weight:bold;
background:#14002a;
box-shadow:0 0 25px #ff00ff;
}

header img{
height:60px;
border-radius:10px;
}

/* intro screen */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(120deg,#ff00ff,#00ffff,#ff7700);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:1000;
animation:introFade 4s forwards;
}

#intro img{
width:200px;
border-radius:20px;
animation:logoFlash 2s infinite;
}

@keyframes logoFlash{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

@keyframes introFade{
0%{opacity:1}
80%{opacity:1}
100%{opacity:0;visibility:hidden}
}

/* arrow */

.scroll-arrow{
text-align:center;
font-size:40px;
color:#ffcc00;
animation:bounce 1s infinite;
margin-top:20px;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(10px)}
}

/* products */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:40px;
padding:50px;
}

/* card */

.card{
background:#14002a;
border-radius:20px;
padding:20px;
box-shadow:0 0 20px #00ffff;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 30px #ff00ff;
}

.card img{
width:100%;
border-radius:15px;
}

/* buttons */

button{
background:#ff0066;
border:none;
padding:10px 20px;
color:white;
border-radius:10px;
cursor:pointer;
margin-top:10px;
font-weight:bold;
box-shadow:0 0 10px #ff0066;
}

button:hover{
background:#ff7700;
}

/* dropdown */

select,input,textarea{
padding:10px;
border-radius:6px;
margin-top:8px;
border:none;
width:90%;
}

/* cart button */

#cartButton{
position:fixed;
top:20px;
right:20px;
background:#ffcc00;
color:black;
padding:12px 18px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 15px #ffcc00;
}

/* cart modal */

#cartModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
align-items:center;
justify-content:center;
}

.cart-content{
background:#14002a;
padding:30px;
border-radius:15px;
width:420px;
box-shadow:0 0 30px #00ffff;
max-height:80vh;
overflow-y:auto;
}

.cart-item{
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* footer */

footer{
text-align:center;
padding:20px;
margin-top:50px;
background:#14002a;
box-shadow:0 0 20px #ff00ff;
}

</style>
</head>

<body>

<!-- INTRO -->

<div id="intro">
<img src="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Pick%20N%20Smile.jpg">
<h1 class="neon">Pick N Smile</h1>
</div>

<!-- MUSIC -->

<audio autoplay loop>
<source src="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/refs/heads/main/the_mountain-happy-happy-music-496549.mp3" type="audio/mpeg">
</audio>

<!-- HEADER -->

<header>
<img src="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Pick%20N%20Smile.jpg">
Pick N Smile
</header>

<div id="cartButton">🛒 Cart</div>

<h2 style="text-align:center;margin-top:40px" class="neon">
Items On Sale
</h2>

<div class="scroll-arrow">⬇</div>

<!-- PRODUCTS -->

<div class="products" id="productList"></div>

<!-- CART -->

<div id="cartModal">

<div class="cart-content">

<h2>Cart</h2>

<div id="cartItems"></div>

<button onclick="showOrder()">Place Order</button>

<div id="orderForm" style="display:none">

<h3>Customer Details</h3>

<input id="name" placeholder="Customer Name">
<input id="email" placeholder="Customer Email">
<input id="phone" placeholder="Customer Phone">
<textarea id="address" placeholder="Delivery Address"></textarea>

<button onclick="sendOrder()">Submit Order</button>

</div>

</div>

</div>

<footer>
© Pick N Smile
</footer>

<script>

/* EMAILJS INIT */

emailjs.init("YOUR_PUBLIC_KEY");

/* CART */

let cart=[];

/* PRODUCTS */

const products=[

{name:"Aprons",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Aprons.jpeg",types:["Pink","Blue","White"]},

{name:"Bookmarks (Thread Knots)",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Bookmark%20(Thread%20Knots).jpeg",types:["Blue","Red","Pink","Violet"]},

{name:"Colour Pencils",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Colour%20Pencils.jpeg",types:["12 Colours"]},

{name:"Erasers",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Erasers.jpeg",types:["Red","Yellow","Blue","Green"]},

{name:"Fidget Spinners",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Fidget%20Spinners%20.jpeg",types:["Korean","Cartoon","Teddy","Stars"]},

{name:"Pencil Stand",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Pencil%20Stand.jpeg",types:["Yellow","Red","Blue"]},

{name:"Sticky Notes",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Sticky%20Notes.jpeg",types:["Type 1","Type 2"]},

{name:"Stitch Pouch",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Stitch%20Themed%20Stationary%20Pouches.jpeg",types:["Pink","Purple","Cyan","Brown"]}

];

/* RENDER PRODUCTS */

const list=document.getElementById("productList");

products.forEach((p,i)=>{

let options="";
p.types.forEach(t=>{
options+=`<option>${t}</option>`;
});

list.innerHTML+=`

<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<select id="type${i}">
${options}
</select>

<select id="qty${i}">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<button onclick="addCart(${i})">Add To Cart</button>

</div>

`;

});

/* ADD CART */

function addCart(i){

let type=document.getElementById("type"+i).value;
let qty=document.getElementById("qty"+i).value;

cart.push({
name:products[i].name,
type:type,
qty:qty
});

renderCart();
alert("Added to cart");

}

/* CART MODAL */

const cartBtn=document.getElementById("cartButton");
const cartModal=document.getElementById("cartModal");

cartBtn.onclick=()=>{
cartModal.style.display="flex";
renderCart();
};

window.onclick=function(e){
if(e.target==cartModal){
cartModal.style.display="none";
}
};

/* RENDER CART */

function renderCart(){

let container=document.getElementById("cartItems");

container.innerHTML="";

if(cart.length==0){
container.innerHTML="Cart is empty";
return;
}

cart.forEach((item,i)=>{

container.innerHTML+=`

<div class="cart-item">

${item.qty} x ${item.type} ${item.name}

<button onclick="removeItem(${i})">❌</button>

</div>

`;

});

}

/* REMOVE */

function removeItem(i){
cart.splice(i,1);
renderCart();
}

/* ORDER */

function showOrder(){

if(cart.length==0){
alert("Cart empty");
return;
}

document.getElementById("orderForm").style.display="block";

}

/* SEND EMAIL */

function sendOrder(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

let order="";

cart.forEach(i=>{
order+=`${i.qty} x ${i.type} ${i.name}\n`;
});

emailjs.send(
"YOUR_SERVICE_ID",
"YOUR_TEMPLATE_ID",
{
customer_name:name,
customer_email:email,
customer_phone:phone,
customer_address:address,
order_items:order
})

.then(()=>{
alert("Order sent successfully");
cart=[];
renderCart();
})

.catch(()=>{
alert("Email failed");
});

}

/* MUSIC FIX */

const music=document.querySelector("audio");

document.body.addEventListener("click",()=>{
music.play();
},{once:true});

</script>

</body>
</html>
