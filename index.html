<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pick N Smile</title>

<link rel="icon" href="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Pick%20N%20Smile.jpg">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

/* GLOBAL */

body{
margin:0;
font-family:"Segoe UI";
background:linear-gradient(135deg,#1a0033,#0a1b5c,#3d0075);
color:white;
overflow-x:hidden;
scroll-behavior:smooth;
}

/* NEON */

.neon{
text-shadow:
0 0 5px #ff00ff,
0 0 10px #00ffff,
0 0 20px #00ffff,
0 0 40px #ff00ff;
}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:center;
gap:15px;
padding:20px;
font-size:36px;
font-weight:bold;
background:#14002a;
box-shadow:0 0 20px #ff00ff;
position:sticky;
top:0;
z-index:10;
}

header img{
height:60px;
border-radius:10px;
}

/* SEARCH */

#searchBar{
width:300px;
padding:10px;
border-radius:10px;
border:none;
margin-top:20px;
}

/* INTRO */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(120deg,#ff00ff,#00ffff,#ff7700);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:1000;
animation:introFade 4s forwards;
}

#intro img{
width:200px;
border-radius:20px;
animation:logoFlash 2s infinite;
}

@keyframes logoFlash{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

@keyframes introFade{
0%{opacity:1}
80%{opacity:1}
100%{opacity:0;visibility:hidden}
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:40px;
padding:50px;
}

.card{
background:#14002a;
border-radius:20px;
padding:20px;
box-shadow:0 0 20px #00ffff;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 30px #ff00ff;
}

.card img{
width:100%;
border-radius:15px;
}

/* BUTTON */

button{
background:linear-gradient(45deg,#ff0066,#ff7700);
border:none;
padding:10px 20px;
color:white;
border-radius:10px;
cursor:pointer;
margin-top:10px;
font-weight:bold;
box-shadow:0 0 10px #ff0066;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* INPUT */

select,input,textarea{
padding:8px;
border-radius:6px;
margin-top:8px;
border:none;
width:90%;
}

/* CART BUTTON */

#cartButton{
position:fixed;
top:20px;
right:20px;
background:#ffcc00;
color:black;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 15px #ffcc00;
}

/* CART MODAL */

#cartModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
align-items:center;
justify-content:center;
}

.cart-content{
background:#14002a;
padding:30px;
border-radius:15px;
width:400px;
box-shadow:0 0 30px #00ffff;
max-height:80vh;
overflow:auto;
}

/* CART ITEM */

.cart-item{
margin-bottom:10px;
background:#1f003a;
padding:10px;
border-radius:8px;
}

/* FOOTER */

footer{
text-align:center;
padding:30px;
margin-top:50px;
background:#14002a;
box-shadow:0 0 20px #ff00ff;
}

/* FLOAT INSTAGRAM */

#instaFloat{
position:fixed;
bottom:20px;
right:20px;
background:#ff00ff;
padding:12px 16px;
border-radius:50px;
font-weight:bold;
box-shadow:0 0 20px #ff00ff;
}

</style>
</head>

<body>

<div id="intro">
<img src="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Pick%20N%20Smile.jpg">
<h1 class="neon">Pick N Smile</h1>
</div>

<audio autoplay loop>
<source src="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/refs/heads/main/the_mountain-happy-happy-music-496549.mp3">
</audio>

<header>
<img src="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Pick%20N%20Smile.jpg">
Pick N Smile
</header>

<div style="text-align:center">
<input id="searchBar" placeholder="Search products...">
</div>

<div id="cartButton">🛒 Cart (<span id="cartCount">0</span>)</div>

<h2 style="text-align:center;margin-top:40px" class="neon">
Items On Sale
</h2>

<div class="products" id="productList"></div>

<div id="cartModal">
<div class="cart-content">

<h2>Shopping Cart</h2>

<div id="cartItems"></div>

<button onclick="showOrder()">Place Order</button>

<div id="orderForm" style="display:none">

<h3>Customer Details</h3>

<input id="name" placeholder="Customer Name">
<input id="email" placeholder="Customer Email">
<input id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Delivery Address"></textarea>

<button onclick="sendOrder()">Submit Order</button>

</div>

</div>
</div>

<a id="instaFloat" href="https://www.instagram.com/picknsmile4u?igsh=MmszbXY4aHB0aHRi" target="_blank">
Instagram
</a>

<footer>

<h3 class="neon">Pick N Smile</h3>

<p>Creative Gifts & Fun Stationery</p>

<p>📞 Contact: 80507 99536</p>

<p>
Instagram:
<a href="https://www.instagram.com/picknsmile4u?igsh=MmszbXY4aHB0aHRi" target="_blank" style="color:#00ffff">
@picknsmile4u
</a>
</p>

<p style="font-size:13px;color:#aaa">© Pick N Smile Gifts Store</p>

</footer>

<script>

/* EMAILJS */

(function(){
emailjs.init("JGA6P6Uh3Bs-jD35I");
})();

/* CART */

let cart=[];

/* PRODUCTS */

const products=[

{name:"Aprons",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Aprons.jpeg",types:["Pink","Blue","White"]},

{name:"Bookmarks (Thread Knots)",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Bookmark%20(Thread%20Knots).jpeg",types:["Blue","Red","Pink","Violet"]},

{name:"Colour Pencils",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Colour%20Pencils.jpeg",types:["12 Colours"]},

{name:"Erasers",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Erasers.jpeg",types:["Red","Yellow","Blue","Green"]},

{name:"Fidget Spinners",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Fidget%20Spinners%20.jpeg",types:["Korean","Cartoon","Teddy","Stars"]},

{name:"Animal Sketch Book",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Funny%20Masks.jpeg",types:["Crocodile","Tiger","Giraffe"]},

{name:"Korean Hand Bags",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Korean%20Hand%20Bags.jpeg",types:["Random"]},

{name:"Pencil Stand",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Pencil%20Stand.jpeg",types:["Yellow","Red","Blue"]},

{name:"Sticky Notes",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Sticky%20Notes.jpeg",types:["Type1","Type2"]},

{name:"Stitch Pouch",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Stitch%20Themed%20Stationary%20Pouches.jpeg",types:["Pink","Purple","Cyan","Brown"]},

{name:"Straw Summer Bags",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Straw%20Summer%20Bag.jpeg",types:["Default"]},

{name:"Utensil Holders",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Utensil%20Holders.jpeg",types:["Blue","Pink","Light Blue","Light Green"]}

];

/* RENDER PRODUCTS */

const list=document.getElementById("productList");

products.forEach((p,index)=>{

let options="";
p.types.forEach(t=>options+=`<option>${t}</option>`);

list.innerHTML+=`

<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<select id="type${index}">${options}</select>

<select id="qty${index}">
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option>
</select>

<button onclick="addCart(${index})">Add To Cart</button>

</div>

`;

});

/* ADD CART */

function addCart(i){

let type=document.getElementById("type"+i).value;
let qty=parseInt(document.getElementById("qty"+i).value);

cart.push({name:products[i].name,type,qty});

updateCart();

}

/* UPDATE CART */

function updateCart(){

document.getElementById("cartCount").innerText=cart.length;

let container=document.getElementById("cartItems");

container.innerHTML="";

cart.forEach((item,index)=>{

container.innerHTML+=`
<div class="cart-item">
${item.qty} x ${item.type} ${item.name}
<button onclick="removeItem(${index})">❌</button>
</div>
`;

});

}

/* REMOVE */

function removeItem(i){
cart.splice(i,1);
updateCart();
}

/* CART OPEN */

const cartBtn=document.getElementById("cartButton");
const cartModal=document.getElementById("cartModal");

cartBtn.onclick=()=>cartModal.style.display="flex";

window.onclick=e=>{
if(e.target==cartModal)cartModal.style.display="none";
};

/* ORDER */

function showOrder(){
if(cart.length===0){
alert("Cart empty");
return;
}
document.getElementById("orderForm").style.display="block";
}

/* SEND ORDER */

function sendOrder(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

let orderText="";

cart.forEach(i=>{
orderText+=`${i.qty} x ${i.type} ${i.name}\n`;
});

let orderID="PNS-"+Math.floor(Math.random()*100000);

emailjs.send("service_qnxa1we","template_pvco6lb",{

customer_name:name,
customer_email:email,
customer_phone:phone,
customer_address:address,
order_items:orderText,
order_id:orderID,
order_date:new Date().toLocaleDateString()

})

.then(()=>{

alert("Order Sent!\nOrder ID: "+orderID);

cart=[];
updateCart();

})

.catch(err=>{
console.log(err);
alert("Failed to send email");
});

}

</script>

</body>
</html>
