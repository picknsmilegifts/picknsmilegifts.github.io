<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pick N Smile</title>

<link rel="icon" href="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Pick%20N%20Smile.jpg">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:center;
gap:15px;
padding:18px;
font-size:32px;
font-weight:bold;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
box-shadow:0 0 20px #ff00ff;
}

header img{
height:55px;
border-radius:10px;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:40px;
}

/* CARD */

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(8px);
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,255,255,0.4);
transition:0.3s;
text-align:center;
}

.card:hover{
transform:translateY(-5px) scale(1.03);
box-shadow:0 0 30px rgba(255,0,255,0.6);
}

.card img{
width:100%;
border-radius:10px;
}

/* INPUTS */

select,input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}

/* BUTTONS */

button{
margin-top:10px;
padding:10px 16px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#ff0080,#ff8c00);
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

/* CART BUTTON */

#cartButton{
position:fixed;
top:20px;
right:20px;
background:#ffd000;
color:black;
padding:10px 15px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 10px #ffd000;
}

/* CART MODAL */

#cartModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
align-items:center;
justify-content:center;
}

.cartBox{
background:#111;
padding:25px;
border-radius:15px;
width:420px;
max-height:80vh;
overflow-y:auto;
}

.cartItem{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

/* SUCCESS POPUP */

#successPopup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px #00ffcc;
text-align:center;
}

</style>
</head>

<body>

<header>
<img src="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Pick%20N%20Smile.jpg">
Pick N Smile
</header>

<div id="cartButton">
🛒 Cart (<span id="cartCount">0</span>)
</div>

<div class="products" id="productList"></div>

<!-- CART -->

<div id="cartModal">

<div class="cartBox">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<button onclick="showOrder()">Place Order</button>
<button onclick="closeCart()">Close</button>

<div id="orderForm" style="display:none">

<h3>Customer Details</h3>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<h4>Order Summary</h4>

<div id="orderSummary"></div>

<button onclick="sendOrder()">Confirm Order</button>

</div>

</div>

</div>

<div id="successPopup">
<h2>Order Sent 🎉</h2>
<p>Your order has been submitted successfully.</p>
<button onclick="closeSuccess()">OK</button>
</div>

<script>

/* EMAILJS */

emailjs.init("JGA6P6Uh3Bs-jD35I");

/* CART */

let cart=[];

/* PRODUCTS */

const products=[

{name:"Aprons",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Aprons.jpeg",types:["Pink","Blue","White"]},

{name:"Bookmarks",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Bookmark%20(Thread%20Knots).jpeg",types:["Blue","Red","Pink","Violet"]},

{name:"Colour Pencils",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Colour%20Pencils.jpeg",types:["12 Colours"]},

{name:"Erasers",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Erasers.jpeg",types:["Red","Yellow","Blue","Green"]},

{name:"Fidget Spinners",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Fidget%20Spinners%20.jpeg",types:["Korean","Cartoon","Teddy","Stars"]},

{name:"Pencil Stand",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Pencil%20Stand.jpeg",types:["Yellow","Red","Blue"]},

{name:"Sticky Notes",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Sticky%20Notes.jpeg",types:["Type 1","Type 2"]},

{name:"Stitch Pouch",image:"https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Stitch%20Themed%20Stationary%20Pouches.jpeg",types:["Pink","Purple","Cyan","Brown"]}

];

/* RENDER PRODUCTS */

const list=document.getElementById("productList");

products.forEach((p,i)=>{

let options="";

p.types.forEach(t=>{
options+=`<option>${t}</option>`;
});

list.innerHTML+=`

<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<select id="type${i}">
${options}
</select>

<select id="qty${i}">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<button onclick="addCart(${i})">Add to Cart</button>

</div>

`;

});

/* ADD CART */

function addCart(i){

let type=document.getElementById("type"+i).value;
let qty=document.getElementById("qty"+i).value;

cart.push({
name:products[i].name,
type:type,
qty:qty
});

updateCart();

}

/* UPDATE CART */

function updateCart(){

document.getElementById("cartCount").innerText=cart.length;

renderCart();

}

/* RENDER CART */

function renderCart(){

let container=document.getElementById("cartItems");

container.innerHTML="";

if(cart.length==0){
container.innerHTML="Cart Empty";
return;
}

cart.forEach((item,i)=>{

container.innerHTML+=`

<div class="cartItem">

${item.qty} x ${item.type} ${item.name}

<button onclick="removeItem(${i})">❌</button>

</div>

`;

});

}

/* REMOVE */

function removeItem(i){
cart.splice(i,1);
updateCart();
}

/* OPEN CART */

document.getElementById("cartButton").onclick=()=>{
document.getElementById("cartModal").style.display="flex";
};

/* CLOSE CART */

function closeCart(){
document.getElementById("cartModal").style.display="none";
}

/* ORDER */

function showOrder(){

if(cart.length==0){
alert("Cart Empty");
return;
}

document.getElementById("orderForm").style.display="block";

let summary="";

cart.forEach(i=>{
summary+=`${i.qty} x ${i.type} ${i.name}\n`;
});

document.getElementById("orderSummary").innerText=summary;

}

/* SEND ORDER */

function sendOrder(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

if(!name || !email || !phone || !address){
alert("Fill all fields");
return;
}

let order="";

cart.forEach(i=>{
order+=`${i.qty} x ${i.type} ${i.name}\n`;
});

emailjs.send(
"service_qnxa1we",
"template_pvco6lb",
{
customer_name:name,
customer_email:email,
customer_phone:phone,
customer_address:address,
order_items:order
})

.then(()=>{

cart=[];
updateCart();

document.getElementById("cartModal").style.display="none";

document.getElementById("successPopup").style.display="block";

})

.catch(()=>{
alert("Email failed");
});

}

/* SUCCESS POPUP */

function closeSuccess(){
document.getElementById("successPopup").style.display="none";
}

</script>

</body>
</html>
