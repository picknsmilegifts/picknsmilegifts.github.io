<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pick N Smile</title>

<link rel="icon" href="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Pick%20N%20Smile.jpg">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffb3ff,#caa0ff,#6fb7ff,#2c4cff);
color:white;
overflow-x:hidden;
}

header{
position:fixed;
top:0;
width:100%;
padding:15px;
background:#00000099;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
}

.logo{
height:50px;
}

.cartbtn{
background:orange;
border:none;
padding:10px 20px;
font-weight:bold;
cursor:pointer;
border-radius:8px;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.arrow{
font-size:50px;
animation:bounce 1s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(10px)}
}

.products{
padding-top:120px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
padding:40px;
}

.card{
background:#00000088;
border-radius:15px;
padding:15px;
box-shadow:0 0 20px #ff66ff;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

button{
background:#ff4da6;
border:none;
padding:10px;
margin-top:10px;
color:white;
border-radius:6px;
cursor:pointer;
}

select{
padding:8px;
margin-top:5px;
}

#cart{
position:fixed;
right:0;
top:0;
height:100%;
width:350px;
background:#111;
padding:20px;
overflow:auto;
display:none;
}

</style>
</head>

<body>

<audio autoplay loop>
<source src="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/refs/heads/main/the_mountain-happy-happy-music-496549.mp3">
</audio>

<header>
<div>
<img class="logo" src="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Pick%20N%20Smile.jpg">
<span style="font-size:24px;font-weight:bold">Pick N Smile</span>
</div>

<button class="cartbtn" onclick="toggleCart()">Cart</button>
</header>


<section class="hero">

<h1 style="font-size:60px;text-shadow:0 0 30px pink">Pick N Smile</h1>

<p>Fun gifts, colourful stationery, creative surprises and joyful return gifts.</p>

<div class="arrow">↓</div>

</section>


<section class="products">

<div class="card">
<img src="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Aprons.jpeg">
<h3>Aprons</h3>

<select id="apronType">
<option>Pink</option>
<option>Blue</option>
<option>White</option>
</select>

<select id="apronQty">
<option>1</option><option>2</option><option>3</option><option>4</option>
<option>5</option><option>6</option><option>7</option>
<option>8</option><option>9</option><option>10</option>
</select>

<button onclick="addToCart('Apron',apronType.value,apronQty.value)">Add To Cart</button>
</div>


<div class="card">
<img src="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Colour%20Pencils.jpeg">
<h3>Colour Pencils</h3>

<select id="pencilQty">
<option>1</option><option>2</option><option>3</option><option>4</option>
<option>5</option><option>6</option><option>7</option>
<option>8</option><option>9</option><option>10</option>
</select>

<button onclick="addToCart('Colour Pencils','12 colours',pencilQty.value)">Add To Cart</button>
</div>


<div class="card">
<img src="https://github.com/picknsmilegifts/picknsmilegifts.github.io/raw/main/Erasers.jpeg">
<h3>Erasers</h3>

<select id="eraserType">
<option>Red</option>
<option>Yellow</option>
<option>Blue</option>
<option>Green</option>
</select>

<select id="eraserQty">
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
<option>7</option><option>8</option><option>9</option>
<option>10</option>
</select>

<button onclick="addToCart('Eraser',eraserType.value,eraserQty.value)">Add To Cart</button>
</div>


</section>


<div id="cart">

<h2>Shopping Cart</h2>

<div id="cartItems"></div>

<hr>

<h3>Customer Details</h3>

<input id="name" placeholder="Name"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="phone" placeholder="Phone"><br><br>

<button onclick="placeOrder()">Place Order</button>

</div>



<script>

emailjs.init("JGA6P6Uh3Bs-jD35I");

let cart = {};

function addToCart(item,type,qty){

let key=item+"-"+type;

qty=parseInt(qty);

if(cart[key]){
cart[key]+=qty;
}
else{
cart[key]=qty;
}

updateCart();

}


function updateCart(){

let list=document.getElementById("cartItems");

list.innerHTML="";

for(let item in cart){

list.innerHTML+=item+" x "+cart[item]+"<br>";

}

}


function toggleCart(){

let c=document.getElementById("cart");

if(c.style.display=="block"){
c.style.display="none";
}else{
c.style.display="block";
}

}


function placeOrder(){

let items="";

for(let i in cart){
items+=i+" x "+cart[i]+"\n";
}

let params={
customer_name:document.getElementById("name").value,
customer_email:document.getElementById("email").value,
customer_phone:document.getElementById("phone").value,
order_items:items,
order_date:new Date().toLocaleString()
};

emailjs.send(
"service_qnxa1we",
"template_pvco6lb",
params
);

alert("Order Sent Successfully!");

cart={};

updateCart();

}

</script>

</body>
</html>
